<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>資格勉強アプリ | 問題演習</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-left"></div>
    <div class="backdrop backdrop-right"></div>
    <div class="page">
      <section class="quizView">
        <header class="quizHeaderBar">
          <div>
            <p class="eyebrow">学習モード</p>
            <h1 class="quizViewTitle">問題演習</h1>
          </div>
          <a href="./index.html" class="buttonSecondary buttonLink">トップへ戻る</a>
        </header>

        <section class="controls">
          <label class="controlField">
            <span class="controlLabel">年度</span>
            <select id="year-filter"></select>
          </label>
          <label class="controlField">
            <span class="controlLabel">カテゴリ</span>
            <select id="category-filter"></select>
          </label>
          <label class="checkbox">
            <input id="review-only" type="checkbox" />
            要復習だけ表示
          </label>
        </section>

        <section class="statusBar">
          <div><strong id="hit-count">0</strong> 問ヒット</div>
          <div>要復習 <strong id="review-count">0</strong> 問</div>
        </section>

        <p id="error-message" class="error" hidden></p>

        <section id="empty-state" class="emptyState" hidden>
          <h2>表示できる問題がありません</h2>
          <p>条件を緩めるか、要復習チェック済みの問題を追加してください。</p>
        </section>

        <section id="quiz-card" class="quizCard" hidden>
          <div class="quizTop">
            <div class="quizMeta">
              <span id="meta-year"></span>
              <span id="meta-category"></span>
              <span id="meta-index"></span>
            </div>
            <div class="progressPanel">
              <div class="progressLabels">
                <span>Progress</span>
                <strong id="progress-text">0%</strong>
              </div>
              <div class="progressTrack">
                <div id="progress-fill" class="progressFill"></div>
              </div>
            </div>
          </div>

          <div class="questionHeader">
            <h2 id="question-text"></h2>
            <button id="review-toggle" type="button" class="star"></button>
          </div>

          <div id="choices" class="choices"></div>

          <div class="actions">
            <button id="prev-button" type="button" class="buttonSecondary">前へ</button>
            <button id="submit-button" type="button" class="buttonPrimary">回答する</button>
            <button id="next-button" type="button" class="buttonSecondary">次へ</button>
          </div>

          <div id="result-panel" class="result" hidden>
            <p id="result-text"></p>
            <p id="explanation-text"></p>
          </div>
        </section>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>資格問題アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">CSVで管理する資格学習アプリ</p>
          <h1>年度別・カテゴリ別に過去問を回せる4択トレーナー</h1>
          <p class="lead">
            問題CSVを差し替えるだけで学習セットを更新できます。要復習チェックを付けた問題だけに絞って反復できます。
          </p>
        </div>
        <div class="uploadCard">
          <label class="uploadLabel" for="csv-upload">CSVを読み込む</label>
          <input id="csv-upload" type="file" accept=".csv" />
          <p id="source-label">現在のデータ: サンプルCSV</p>
          <p class="hint">
            必須列: id, year, category, question, choice1, choice2, choice3, choice4,
            answer, explanation
          </p>
        </div>
      </header>

      <section class="controls">
        <label>
          年度
          <select id="year-filter"></select>
        </label>
        <label>
          カテゴリ
          <select id="category-filter"></select>
        </label>
        <label class="checkbox">
          <input id="review-only" type="checkbox" />
          要復習だけ表示
        </label>
      </section>

      <section class="statusBar">
        <div><strong id="hit-count">0</strong> 問ヒット</div>
        <div>要復習 <strong id="review-count">0</strong> 問</div>
      </section>

      <p id="error-message" class="error" hidden></p>

      <section id="empty-state" class="emptyState" hidden>
        <h2>表示できる問題がありません</h2>
        <p>条件を緩めるか、要復習チェック済みの問題を追加してください。</p>
      </section>

      <section id="quiz-card" class="quizCard" hidden>
        <div class="quizMeta">
          <span id="meta-year"></span>
          <span id="meta-category"></span>
          <span id="meta-index"></span>
        </div>

        <div class="questionHeader">
          <h2 id="question-text"></h2>
          <button id="review-toggle" type="button" class="star"></button>
        </div>

        <div id="choices" class="choices"></div>

        <div class="actions">
          <button id="prev-button" type="button">前へ</button>
          <button id="submit-button" type="button">回答する</button>
          <button id="next-button" type="button">次へ</button>
        </div>

        <div id="result-panel" class="result" hidden>
          <p id="result-text"></p>
          <p id="explanation-text"></p>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
